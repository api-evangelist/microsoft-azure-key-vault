specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Azure Key Vault
providerId: microsoft-azure-key-vault
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - FinOps
  - FOCUS
  - Security
  - Microsoft Azure
description: 'FOCUS-aligned FinOps for Azure Key Vault: per-10,000-operation pricing on the Standard
  tier and per-active-HSM-key plus per-operation pricing on the Premium tier; Managed HSM bills per
  pool-hour plus per-operation.'
sources:
  - https://azure.microsoft.com/en-us/pricing/details/key-vault/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Microsoft Corporation
serviceCategory: Security / Key Management
billingModel:
  pricingCategory: Pay-As-You-Go
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
    - Tax
    - Adjustment
    - Credit
focusColumns:
  ServiceName: Azure Key Vault
  ServiceCategory: Security
  ProviderName: Microsoft
  PublisherName: Microsoft Corporation
  InvoiceIssuerName: Microsoft Corporation
  BillingCurrency: USD
  ChargeCategory: Usage
meters:
  - name: secret_operations
    unit: operation
    aggregation: sum
    dimensions:
      - vault
      - region
  - name: software_key_operations
    unit: operation
    aggregation: sum
    dimensions:
      - vault
      - region
  - name: hsm_key_operations
    unit: operation
    aggregation: sum
    dimensions:
      - vault
      - region
      - key_type
  - name: hsm_active_keys
    unit: key-month
    aggregation: max
    dimensions:
      - vault
      - key_type
  - name: certificate_renewals
    unit: certificate
    aggregation: sum
    dimensions:
      - vault
  - name: managed_hsm_pool_hours
    unit: instance-hour
    aggregation: sum
    dimensions:
      - region
      - pool
principles:
  - name: Visibility
    description: Use Azure Monitor metrics (TotalServiceApiHits, ServiceApiResultStatus) and Cost
      Management filtered to Microsoft.KeyVault to break down per-vault and per-operation cost.
  - name: Allocation
    description: Use one Key Vault per environment/team/application and tag with cost-center; per-vault
      cost rolls up cleanly to that owner.
  - name: Optimization
    description: Avoid per-operation calls in hot paths via DEK caching with envelope encryption;
      consolidate low-volume vaults; choose Standard over Premium when HSM is not required; use Managed
      HSM only when FIPS 140-2 L3 is needed.
  - name: Accountability
    description: Assign vault owners as cost owners; alert on operation-rate spikes and certificate-renewal
      cost; review HSM key inventory quarterly to remove inactive keys (only active keys are billed).
maintainers:
