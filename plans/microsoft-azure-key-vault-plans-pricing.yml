specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Azure Key Vault
providerId: microsoft-azure-key-vault
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Security
  - Secrets Management
  - Key Management
  - HSM
  - Microsoft Azure
description: Azure Key Vault is pure pay-as-you-go with two service tiers - Standard (software-protected
  keys, secrets, certificates) and Premium (HSM-protected keys). Charges are per 10,000 operations,
  per-key-month for active HSM keys, and per certificate renewal. Managed HSM is a separate dedicated
  pool with hourly billing.
sources:
  - https://azure.microsoft.com/en-us/pricing/details/key-vault/
plans:
  - id: microsoft-azure-key-vault-standard
    name: Standard
    type: usage-based
    description: Software-protected keys, secrets, and certificates. Per-operation pricing only.
    entries:
      - label: Secret operations
        name: secret_ops
        type: metered
        metric: operation
        limit: -1
        timeFrame: usage
        geo: per-region
        unit: 10000
        price: '0.03 per 10,000 operations'
        userMultiplied: false
      - label: Certificate operations
        name: certificate_ops
        type: metered
        metric: operation
        limit: -1
        timeFrame: usage
        geo: per-region
        unit: 10000
        price: '0.03 per 10,000 operations'
        userMultiplied: false
      - label: Certificate renewal
        name: certificate_renewal
        type: metered
        metric: certificate
        limit: -1
        timeFrame: usage
        geo: per-region
        unit: 1
        price: '3.00 per renewal'
        userMultiplied: false
      - label: Managed Storage Account key rotation
        name: managed_storage_rotation
        type: metered
        metric: rotation
        limit: -1
        timeFrame: usage
        geo: per-region
        unit: 1
        price: 'see Azure pricing page'
        userMultiplied: false
    elements:
      - name: Software-protected keys, secrets, certificates
      - name: Per-operation pricing
      - name: No monthly key fee
  - id: microsoft-azure-key-vault-premium
    name: Premium
    type: usage-based
    description: HSM-protected keys (FIPS 140-2 Level 2). Per-key-month for active HSM keys plus
      per-operation pricing.
    entries:
      - label: HSM-protected RSA 2048 key (active key/month)
        name: hsm_rsa2048
        type: subscription
        metric: key
        limit: -1
        timeFrame: month
        geo: per-region
        unit: 1
        price: '1.00 per active key/month'
        userMultiplied: false
      - label: HSM-protected RSA 3072 / 4096 / EC key (active key/month)
        name: hsm_advanced_key
        type: subscription
        metric: key
        limit: -1
        timeFrame: month
        geo: per-region
        unit: 1
        price: 'tiered per Azure pricing page'
        userMultiplied: false
      - label: HSM operations (RSA 2048)
        name: hsm_rsa2048_ops
        type: metered
        metric: operation
        limit: -1
        timeFrame: usage
        geo: per-region
        unit: 10000
        price: '0.03 per 10,000 operations'
        userMultiplied: false
      - label: HSM operations (RSA 3072 / 4096 / EC)
        name: hsm_advanced_ops
        type: metered
        metric: operation
        limit: -1
        timeFrame: usage
        geo: per-region
        unit: 10000
        price: '0.15 per 10,000 operations'
        userMultiplied: false
    elements:
      - name: HSM-backed keys (FIPS 140-2 Level 2)
      - name: Only active keys (used in last 30 days) are billed
      - name: Each key version counted separately
      - name: All Standard tier capabilities
  - id: microsoft-azure-key-vault-managed-hsm
    name: Managed HSM
    type: usage-based
    description: Single-tenant FIPS 140-2 Level 3 HSM pool. Hourly billing per HSM pool plus per-operation
      charges.
    entries:
      - label: Managed HSM pool / hour
        name: managed_hsm_pool
        type: subscription
        metric: hour
        limit: -1
        timeFrame: hour
        geo: per-region
        unit: 1
        price: 'see Azure pricing page (per-hour pool fee)'
        userMultiplied: false
      - label: Managed HSM operations
        name: managed_hsm_ops
        type: metered
        metric: operation
        limit: -1
        timeFrame: usage
        geo: per-region
        unit: 10000
        price: 'see Azure pricing page'
        userMultiplied: false
    elements:
      - name: Single-tenant HSM pool
      - name: FIPS 140-2 Level 3
      - name: BYOK and HYOK
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
