name: Azure Key Vault
description: >-
  Azure Key Vault is a cloud service for securely storing and accessing secrets, keys,
  and certificates. It helps safeguard cryptographic keys and secrets used by cloud
  applications and services.
image: https://azure.microsoft.com/svghandler/key-vault/
tags:
  - Certificates
  - Cloud Security
  - Cryptography
  - Key Management
  - Secrets Management
