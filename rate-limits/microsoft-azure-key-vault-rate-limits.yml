specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Azure Key Vault
providerId: microsoft-azure-key-vault
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Rate Limiting
  - Security
  - Key Management
  - Microsoft Azure
description: Azure Key Vault enforces per-vault and per-subscription/region request-rate limits separately
  for HSM and non-HSM operations. Limits are intentionally low compared to general data services because
  Key Vault is a control-plane-style service. Managed HSM has its own higher per-pool transaction limits.
sources:
  - https://learn.microsoft.com/en-us/azure/key-vault/general/service-limits
  - https://learn.microsoft.com/en-us/azure/key-vault/managed-hsm/built-in-roles
headers:
  retryAfter: Retry-After
  requestId: x-ms-request-id
responseCodes:
  throttled: 429
limits:
  - name: HSM keys - other transactions per vault per 10s
    scope: vault
    metric: requests_per_10_seconds
    limit: 1000
    timeFrame: second
  - name: HSM keys - cryptographic operations per vault per 10s
    scope: vault
    metric: requests_per_10_seconds
    limit: 'see Azure Key Vault service limits (varies by key type)'
  - name: Software keys - cryptographic operations per vault per 10s
    scope: vault
    metric: requests_per_10_seconds
    limit: 2000
    timeFrame: second
  - name: Software keys - other operations per vault per 10s
    scope: vault
    metric: requests_per_10_seconds
    limit: 4000
    timeFrame: second
  - name: Secrets, managed storage, vault transactions per vault per 10s
    scope: vault
    metric: requests_per_10_seconds
    limit: 4000
    timeFrame: second
  - name: Subscription/region aggregate
    scope: subscription/region
    metric: requests_per_10_seconds
    limit: 'see Azure Key Vault service limits (per subscription per region)'
  - name: Managed HSM transactions
    scope: managed_hsm
    metric: requests_per_second
    limit: 'see Managed HSM throughput targets'
policies:
  - name: Honor Retry-After
    description: Wait the duration specified in Retry-After before retrying. Throttling on Key Vault
      is by design tighter than data-plane services.
  - name: Cache and reuse access tokens
    description: Acquire AAD access tokens once and reuse for the token lifetime; do not call AAD
      on every Key Vault operation.
  - name: Cache key material locally
    description: For high-throughput crypto, use a Managed HSM with envelope encryption and cache
      the data encryption key (DEK) locally rather than calling Key Vault per operation.
  - name: Backoff with jitter
    description: Apply exponential backoff with jitter on 429 responses to avoid retry storms across
      callers.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
